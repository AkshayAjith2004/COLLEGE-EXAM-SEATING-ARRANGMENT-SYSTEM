{% extends 'base.html' %}

{% block title %}Edit Examination | College Exam Seating Arrangement System{% endblock %}

{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{% url 'dashboard' %}" class="text-dark-blue text-decoration-none">Home</a></li>
<li class="breadcrumb-item"><a href="{% url 'exam_list' %}" class="text-dark-blue text-decoration-none">Examinations</a></li>
<li class="breadcrumb-item active" aria-current="page">Edit</li>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-dark-blue text-white py-3">
                <h5 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-accent"></i>Edit Examination Session</h5>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-medium small text-muted mb-1">Examination Title</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ exam.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="code" class="form-label fw-medium small text-muted mb-1">Session Code</label>
                        <input type="text" class="form-control" id="code" name="code" value="{{ exam.code }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="academic_year" class="form-label fw-medium small text-muted mb-1">Academic Year</label>
                        <select class="form-select" id="academic_year" name="academic_year" required>
                            {% for ay in academic_years %}
                            <option value="{{ ay.id }}" {% if exam.academic_year.id == ay.id %}selected{% endif %}>{{ ay.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="is_active" name="is_active" {% if exam.is_active %}checked{% endif %}>
                        <label class="form-check-label text-muted small fw-medium" for="is_active">Mark Active Session</label>
                    </div>
                </div>
                <div class="card-footer bg-light p-3 d-flex justify-content-end gap-2">
                    <a href="{% url 'exam_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-dark-blue text-white"><i class="bi bi-save me-2"></i>Update Exam</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
